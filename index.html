<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CS3 Stable FPS</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }

video {
  position:absolute;
  width:100vw;
  height:100vh;
  object-fit:cover;
  opacity:0.12;
  transform:scaleX(-1);
}

canvas {
  position:absolute;
  top:0;
  left:0;
}

#hud {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
}

#hp {
  position:absolute;
  bottom:20px;
  left:20px;
  width:200px;
  height:15px;
  border:1px solid white;
}

#hpBar {
  width:100%;
  height:100%;
  background:lime;
}

#start {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:12px 18px;
}
</style>
</head>

<body>

<div id="hud">Score: 0</div>
<div id="hp"><div id="hpBar"></div></div>
<button id="start">START</button>

<video id="video" autoplay playsinline></video>
<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let score = 0;
let hp = 100;

// 👇 IMPORTANT: stabil player position
let playerX = innerWidth/2;

let enemy = { x:200, y:150, cooldown:60 };
let bullets = [];

// spawn enemy
function spawn(){
  enemy.x = Math.random()*innerWidth;
  enemy.y = Math.random()*innerHeight*0.4;
  enemy.cooldown = 60;
}
spawn();

// simple shoot
function shoot(){
  bullets.push({ x:enemy.x, y:enemy.y, vx:(playerX-enemy.x)*0.01, vy:4 });
}

// GAME LOOP
function loop(){
  ctx.clearRect(0,0,c.width,c.height);

  // enemy
  ctx.fillStyle="cyan";
  ctx.beginPath();
  ctx.arc(enemy.x,enemy.y,20,0,Math.PI*2);
  ctx.fill();

  // player crosshair
  ctx.strokeStyle="white";
  ctx.beginPath();
  ctx.moveTo(playerX-10, innerHeight-50);
  ctx.lineTo(playerX+10, innerHeight-50);
  ctx.stroke();

  // bullets
  ctx.fillStyle="red";
  bullets.forEach(b=>{
    b.x += b.vx;
    b.y += b.vy;

    ctx.fillRect(b.x,b.y,3,3);

    if(Math.abs(b.x-playerX)<20 && b.y>innerHeight-100){
      hp -= 3;
      if(hp<0) hp=0;
    }
  });

  document.getElementById("hpBar").style.width = hp+"%";

  enemy.cooldown--;
  if(enemy.cooldown<=0){
    shoot();
    enemy.cooldown = 50;
  }

  requestAnimationFrame(loop);
}
loop();

// CAMERA (ONLY X MOVEMENT)
const video = document.getElementById("video");

const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands:1,
  minDetectionConfidence:0.7,
  minTrackingConfidence:0.7
});

hands.onResults(res=>{
  if(res.multiHandLandmarks?.length){
    const hand = res.multiHandLandmarks[0];
    const tip = hand[8];

    // smooth + stable movement ONLY X
    playerX = (1 - tip.x) * innerWidth;
  }
});

const cam = new Camera(video,{
  onFrame: async ()=>{
    await hands.send({image:video});
  },
  width:640,
  height:480
});

// start
document.getElementById("start").onclick = async ()=>{
  document.getElementById("start").style.display="none";
  await cam.start();
};
</script>

</body>
</html>
